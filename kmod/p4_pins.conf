# P4 Display Pin Configuration
# Edit these values to match your wiring
# Run 'make dtsi' to regenerate p4_display.dtsi

# SPI bus and chip select
SPI_BUS         = 0
SPI_CS          = 0

# SPI speed in Hz
SPI_SPEED       = 16000000

# GPIO chip number (0 = /dev/gpiochip0, typically the main GPIO controller)
GPIO_CHIP       = 0

# GPIO line numbers (BCM numbering on Raspberry Pi)
GPIO_ENABLE     = 5
GPIO_READY      = 6
GPIO_NRESET     = 13
GPIO_COLD       = 22
GPIO_NSLEEP     = 17
GPIO_VSYNC      = 27

# Display orientation at boot (0 = normal, 1 = 180° flip)
# Can be changed at runtime via /sys/.../user_flip
UPSIDE_DOWN     = 0
